name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (tddSkillTests)
        working-directory: tddSkillTests
        run: npm install

      - name: Run test suite (tddSkillTests)
        working-directory: tddSkillTests
        run: npm test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install dependencies (Caroline prototype)
        working-directory: prototypes/Caroline
        run: npm install

      - name: Run test suite (Caroline prototype)
        working-directory: prototypes/Caroline
        run: npm test

      - name: Install dependencies
        working-directory: prototypes/divya
        run: npm install

      - name: Run test suite
        working-directory: prototypes/divya
        run: npm test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
