<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Shop Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="app-shell">
      <section class="panel input-panel">
        <p class="kicker">Smart Shop Prototype</p>
        <h1>Compare full-cart totals by store.</h1>
        <p class="lead">
          Add your list and compare total cost + distance.
        </p>

        <label for="shopping-list">Shopping list (one item per line)</label>
        <textarea id="shopping-list" spellcheck="false"></textarea>

        <label for="location-query">Your location (city or ZIP)</label>
        <input id="location-query" type="text" value="Santa Clara, CA" />

        <label for="max-distance">Max distance willing to travel</label>
        <div class="range-row">
          <input id="max-distance" type="range" min="1" max="25" value="10" />
          <output id="distance-value">10 mi</output>
        </div>

        <button id="compare-btn" type="button">Compare Stores</button>
        <button id="save-purchase-btn" type="button" class="secondary">
          Save List
        </button>
        <p id="status-line" class="status-line"></p>

        <div class="alternative-panel">
          <h3>Find Similar Alternatives</h3>
          <label for="alternative-description">Description</label>
          <textarea id="alternative-description" spellcheck="false" rows="4"></textarea>
          <label for="alternative-image">Optional reference image</label>
          <input id="alternative-image" type="file" accept="image/*" />
          <button id="find-alternatives-btn" type="button">Search</button>
          <div id="alternative-results" class="alternative-results"></div>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>Store Options</h2>
          <p>Each card shows total price for your full list + distance.</p>
        </div>
        <div class="frequent-wrap">
          <h3>Most Frequently Purchased Items</h3>
          <div id="frequent-items" class="frequent-items"></div>
        </div>
        <div class="frequent-wrap">
          <h3>Current List Category Mix</h3>
          <div id="category-counts" class="frequent-items"></div>
        </div>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <template id="store-card-template">
      <article class="store-card">
        <header>
          <h3 class="store-name"></h3>
          <span class="distance-pill"></span>
        </header>
        <p class="total-label">Estimated cart total</p>
        <p class="total-price"></p>
        <p class="coverage-line"></p>
        <details>
          <summary>Show item prices</summary>
          <ul class="item-prices"></ul>
        </details>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
